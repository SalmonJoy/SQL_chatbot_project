services:
  sql-chatbot:
    build:
      context: .
    container_name: sql-chatbot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HF_HOME: /app/.cache/huggingface
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_HEADLESS: "true"
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./logs:/app/logs
      - hf-cache:/app/.cache/huggingface

volumes:
  hf-cache:
